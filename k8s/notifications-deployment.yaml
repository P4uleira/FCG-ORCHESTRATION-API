apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-api
  labels:
    app: notifications-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-api
  template:
    metadata:
      labels:
        app: notifications-api
    spec:
      restartPolicy: Always

      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z rabbitmq 5672; do
                echo "Aguardando RabbitMQ..."
                sleep 3
              done

      containers:
        - name: notifications-api
          image: fcg-notifications-api:1.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8083
              protocol: TCP

          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8083"

            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: ASPNETCORE_ENVIRONMENT

            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef:
                  name: fcg-config
                  key: RabbitMq__Host

            - name: RabbitMq__Username
              valueFrom:
                secretKeyRef:
                  name: fcg-secret
                  key: RabbitMq__Username

            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef:
                  name: fcg-secret
                  key: RabbitMq__Password